# Silicon Valet — full server-agent stack.
#
# Bindings default to 127.0.0.1 so nothing is exposed to the LAN by accident.
# Talk to the UI at http://127.0.0.1:3000 from the server console, or tunnel
# via `ssh -L 3000:127.0.0.1:3000 <server>` from your workstation.
#
# For multi-user LAN access in a trusted environment, set SV_BIND=0.0.0.0
# in .env and rely on the WireGuard profile generated by usb/autorun.sh.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: sv-ollama
    # Ollama stays on the internal network only; nothing else needs to reach it.
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  silicon-valet:
    build: .
    container_name: sv-core
    # WebSocket (CLI) + HTTP (OpenWebUI) — both bound to loopback by default.
    ports:
      - "${SV_BIND:-127.0.0.1}:7443:7443"
      - "${SV_BIND:-127.0.0.1}:7444:7444"
    environment:
      SV_OLLAMA_WORKER01: "http://ollama:11434"
      SV_OLLAMA_WORKER02: "http://ollama:11434"
      SV_ORCHESTRATOR_MODEL: "${SV_ORCHESTRATOR_MODEL:-qwen3:8b}"
      SV_CODER_MODEL: "${SV_CODER_MODEL:-qwen2.5-coder:7b}"
      SV_EMBED_MODEL: "${SV_EMBED_MODEL:-nomic-embed-text}"
      SV_FAST_MODEL: "${SV_FAST_MODEL:-phi4-mini}"
      SV_DATA_DIR: "/data/valet"
      SV_BACKUP_DIR: "/data/backups"
      SV_WS_HOST: "0.0.0.0"       # inside container; host port is guarded above
      SV_WS_PORT: "7443"
      SV_HTTP_HOST: "0.0.0.0"
      SV_HTTP_PORT: "7444"
      SV_HTTP_ENABLED: "true"
      SV_AUTH_TOKEN: "${SV_AUTH_TOKEN:-}"
      SV_HTTP_AUTO_APPROVE_YELLOW: "${SV_HTTP_AUTO_APPROVE_YELLOW:-false}"
      SV_ENABLE_CISCO: "${SV_ENABLE_CISCO:-false}"
      SV_ENABLE_NOKIA: "${SV_ENABLE_NOKIA:-false}"
      SV_ENABLE_ADTRAN: "${SV_ENABLE_ADTRAN:-false}"
    volumes:
      - valet_data:/data/valet
      - valet_backups:/data/backups
      - /etc/silicon_valet:/etc/silicon_valet:ro   # device inventory
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: sv-openwebui
    # OpenWebUI is the chat UI the human sees. Bound to loopback by default.
    ports:
      - "${SV_BIND:-127.0.0.1}:3000:8080"
    environment:
      # Point OpenWebUI at Silicon Valet's OpenAI-compatible endpoint.
      OPENAI_API_BASE_URL: "http://silicon-valet:7444/v1"
      OPENAI_API_KEY: "${SV_AUTH_TOKEN:-disabled}"
      # Disable Ollama direct — we want every chat to go through Silicon Valet.
      ENABLE_OLLAMA_API: "false"
      # First-run admin account creation is enabled; set WEBUI_AUTH=false only
      # if you already have another auth layer (reverse proxy, WireGuard).
      WEBUI_AUTH: "${WEBUI_AUTH:-true}"
      WEBUI_NAME: "Silicon Valet"
      DEFAULT_MODELS: "silicon-valet"
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      - silicon-valet
    restart: unless-stopped

volumes:
  ollama_data:
  valet_data:
  valet_backups:
  openwebui_data:
