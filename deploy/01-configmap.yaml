apiVersion: v1
kind: ConfigMap
metadata:
  name: valet-config
  namespace: silicon-valet
data:
  SV_DATA_DIR: "/data/valet"
  SV_OLLAMA_WORKER01: "http://ollama-worker01:11434"
  SV_OLLAMA_WORKER02: "http://ollama-worker02:11434"
  SV_ORCHESTRATOR_MODEL: "qwen3:8b"
  SV_CODER_MODEL: "qwen2.5-coder:7b"
  SV_EMBED_MODEL: "nomic-embed-text"
  SV_NUM_CTX: "4096"
  SV_SCAN_INTERVAL: "600"
  SV_WS_HOST: "0.0.0.0"
  SV_WS_PORT: "7443"
  SV_RISK_AUTO_APPROVE_GREEN: "true"
